name: Bicep Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.bicep'
      - '**.bicepparam'
      - '.github/workflows/bicep-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

# Only one deploy workflow runs at a time per branch.
# A new push cancels any in-progress run for the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name == 'push' || github.event.inputs.environment == 'dev'
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep lint
        run: az bicep build --file main.bicep
      - name: Pre-deploy — deallocate VM and remove stale resources
        shell: bash
        run: |
          RG="rg-NSSDeployment-dev"
          VM="vm-nssdeployment-dev"

          # Deallocate VM so ARM can update NIC attachments
          STATE=$(az vm show --resource-group "$RG" --name "$VM" \
            --query "powerState" -d -o tsv 2>/dev/null || echo "NotFound")
          if [ "$STATE" = "NotFound" ]; then
            echo "VM $VM not found — skipping deallocation."
          else
            echo "VM $VM found (state: $STATE) — deallocating..."
            az vm deallocate --resource-group "$RG" --name "$VM"
            echo "VM $VM deallocated."
          fi

          # Delete stale NIC from before the nic1/nic2 rename
          STALE_NIC="nic-nssdeployment-dev"
          if az network nic show --resource-group "$RG" --name "$STALE_NIC" &>/dev/null; then
            echo "Deleting stale NIC $STALE_NIC..."
            az network nic delete --resource-group "$RG" --name "$STALE_NIC"
            echo "Deleted $STALE_NIC."
          else
            echo "Stale NIC $STALE_NIC not found — nothing to clean up."
          fi

          # Delete any NSG that does not match the canonical naming convention
          EXPECTED_NSG="nsg-nssdeployment-dev"
          az network nsg list --resource-group "$RG" --query "[].name" -o tsv | while read -r NSG; do
            if [ "$NSG" != "$EXPECTED_NSG" ]; then
              echo "Deleting stale NSG $NSG..."
              az network nsg delete --resource-group "$RG" --name "$NSG"
              echo "Deleted $NSG."
            fi
          done

          # Delete any existing Key Vault Secrets User role assignments on the KV
          # so ARM can create a fresh one after VM recreation (avoids RoleAssignmentUpdateNotPermitted)
          KV_ID=$(az keyvault show --name "kv-nssdeployment-dev" --resource-group "$RG" \
            --query id -o tsv 2>/dev/null || true)
          if [ -n "$KV_ID" ]; then
            echo "Removing stale Key Vault Secrets User role assignments from $KV_ID..."
            az role assignment delete \
              --scope "$KV_ID" \
              --role "4633458b-17de-408a-b874-0445c86b69e6" \
              2>/dev/null || echo "No stale role assignments to remove."
          fi
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_NAME="deploy-dev-${{ github.run_number }}"
          RG="rg-NSSDeployment-dev"

          dump_failures() {
            local rg="$1" name="$2" depth="${3:-0}"
            if [ "$depth" -gt 6 ]; then
              echo "::warning::Max nested deployment depth reached at $name"
              return 0
            fi
            echo "--- failed operations (depth=$depth): $name ---"
            az deployment operation group list \
              --resource-group "$rg" --name "$name" \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
              -o table || true
            echo "--- deployment error payload: $name ---"
            az deployment group show \
              --resource-group "$rg" --name "$name" \
              --query "properties.error" -o jsonc || true
            mapfile -t nested_deployments < <(
              az deployment operation group list \
                --resource-group "$rg" --name "$name" \
                --query "[?properties.provisioningState=='Failed' && properties.targetResource.resourceType=='Microsoft.Resources/deployments'].properties.targetResource.resourceName" \
                -o tsv 2>/dev/null || true
            )
            for nested in "${nested_deployments[@]}"; do
              if [ -n "$nested" ]; then
                echo "--- nested deployment detected: $nested ---"
                dump_failures "$rg" "$nested" "$((depth+1))"
              fi
            done
          }

          if ! az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RG" \
            --template-file main.bicep \
            --parameters environments/dev/main.bicepparam; then

            echo "::error::Deployment failed — dumping operation details for $DEPLOYMENT_NAME"
            dump_failures "$RG" "$DEPLOYMENT_NAME"
            exit 1
          fi

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    needs: [deploy-dev]
    if: |
      always() && (
        (github.event_name == 'push' && needs.deploy-dev.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
      )
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep lint
        run: az bicep build --file main.bicep
      - name: Pre-deploy — deallocate VM and remove stale resources
        shell: bash
        run: |
          RG="rg-NSSDeployment-staging"
          VM="vm-nssdeployment-staging"

          STATE=$(az vm show --resource-group "$RG" --name "$VM" \
            --query "powerState" -d -o tsv 2>/dev/null || echo "NotFound")
          if [ "$STATE" = "NotFound" ]; then
            echo "VM $VM not found — skipping deallocation."
          else
            echo "VM $VM found (state: $STATE) — deallocating..."
            az vm deallocate --resource-group "$RG" --name "$VM"
            echo "VM $VM deallocated."
          fi

          STALE_NIC="nic-nssdeployment-staging"
          if az network nic show --resource-group "$RG" --name "$STALE_NIC" &>/dev/null; then
            echo "Deleting stale NIC $STALE_NIC..."
            az network nic delete --resource-group "$RG" --name "$STALE_NIC"
            echo "Deleted $STALE_NIC."
          else
            echo "Stale NIC $STALE_NIC not found — nothing to clean up."
          fi

          EXPECTED_NSG="nsg-nssdeployment-staging"
          az network nsg list --resource-group "$RG" --query "[].name" -o tsv | while read -r NSG; do
            if [ "$NSG" != "$EXPECTED_NSG" ]; then
              echo "Deleting stale NSG $NSG..."
              az network nsg delete --resource-group "$RG" --name "$NSG"
              echo "Deleted $NSG."
            fi
          done

          # Delete any existing Key Vault Secrets User role assignments on the KV
          KV_ID=$(az keyvault show --name "kv-nssdeployment-staging" --resource-group "$RG" \
            --query id -o tsv 2>/dev/null || true)
          if [ -n "$KV_ID" ]; then
            echo "Removing stale Key Vault Secrets User role assignments from $KV_ID..."
            az role assignment delete \
              --scope "$KV_ID" \
              --role "4633458b-17de-408a-b874-0445c86b69e6" \
              2>/dev/null || echo "No stale role assignments to remove."
          fi
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_NAME="deploy-staging-${{ github.run_number }}"
          RG="rg-NSSDeployment-staging"

          dump_failures() {
            local rg="$1" name="$2" depth="${3:-0}"
            if [ "$depth" -gt 6 ]; then
              echo "::warning::Max nested deployment depth reached at $name"
              return 0
            fi
            echo "--- failed operations (depth=$depth): $name ---"
            az deployment operation group list \
              --resource-group "$rg" --name "$name" \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
              -o table || true
            echo "--- deployment error payload: $name ---"
            az deployment group show \
              --resource-group "$rg" --name "$name" \
              --query "properties.error" -o jsonc || true
            mapfile -t nested_deployments < <(
              az deployment operation group list \
                --resource-group "$rg" --name "$name" \
                --query "[?properties.provisioningState=='Failed' && properties.targetResource.resourceType=='Microsoft.Resources/deployments'].properties.targetResource.resourceName" \
                -o tsv 2>/dev/null || true
            )
            for nested in "${nested_deployments[@]}"; do
              if [ -n "$nested" ]; then
                echo "--- nested deployment detected: $nested ---"
                dump_failures "$rg" "$nested" "$((depth+1))"
              fi
            done
          }

          if ! az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RG" \
            --template-file main.bicep \
            --parameters environments/staging/main.bicepparam; then

            echo "::error::Deployment failed — dumping operation details for $DEPLOYMENT_NAME"
            dump_failures "$RG" "$DEPLOYMENT_NAME"
            exit 1
          fi

  deploy-prod:
    name: Deploy to prod (requires approval)
    runs-on: ubuntu-latest
    environment: prod
    needs: [deploy-staging]
    if: |
      always() && (
        (github.event_name == 'push' && needs.deploy-staging.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
      )
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep lint
        run: az bicep build --file main.bicep
      - name: Pre-deploy — deallocate VM and remove stale resources
        shell: bash
        run: |
          RG="rg-NSSDeployment-prod"
          VM="vm-nssdeployment-prod"

          STATE=$(az vm show --resource-group "$RG" --name "$VM" \
            --query "powerState" -d -o tsv 2>/dev/null || echo "NotFound")
          if [ "$STATE" = "NotFound" ]; then
            echo "VM $VM not found — skipping deallocation."
          else
            echo "VM $VM found (state: $STATE) — deallocating..."
            az vm deallocate --resource-group "$RG" --name "$VM"
            echo "VM $VM deallocated."
          fi

          STALE_NIC="nic-nssdeployment-prod"
          if az network nic show --resource-group "$RG" --name "$STALE_NIC" &>/dev/null; then
            echo "Deleting stale NIC $STALE_NIC..."
            az network nic delete --resource-group "$RG" --name "$STALE_NIC"
            echo "Deleted $STALE_NIC."
          else
            echo "Stale NIC $STALE_NIC not found — nothing to clean up."
          fi

          EXPECTED_NSG="nsg-nssdeployment-prod"
          az network nsg list --resource-group "$RG" --query "[].name" -o tsv | while read -r NSG; do
            if [ "$NSG" != "$EXPECTED_NSG" ]; then
              echo "Deleting stale NSG $NSG..."
              az network nsg delete --resource-group "$RG" --name "$NSG"
              echo "Deleted $NSG."
            fi
          done

          # Delete any existing Key Vault Secrets User role assignments on the KV
          KV_ID=$(az keyvault show --name "kv-nssdeployment-prod" --resource-group "$RG" \
            --query id -o tsv 2>/dev/null || true)
          if [ -n "$KV_ID" ]; then
            echo "Removing stale Key Vault Secrets User role assignments from $KV_ID..."
            az role assignment delete \
              --scope "$KV_ID" \
              --role "4633458b-17de-408a-b874-0445c86b69e6" \
              2>/dev/null || echo "No stale role assignments to remove."
          fi
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_NAME="deploy-prod-${{ github.run_number }}"
          RG="rg-NSSDeployment-prod"

          dump_failures() {
            local rg="$1" name="$2" depth="${3:-0}"
            if [ "$depth" -gt 6 ]; then
              echo "::warning::Max nested deployment depth reached at $name"
              return 0
            fi
            echo "--- failed operations (depth=$depth): $name ---"
            az deployment operation group list \
              --resource-group "$rg" --name "$name" \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
              -o table || true
            echo "--- deployment error payload: $name ---"
            az deployment group show \
              --resource-group "$rg" --name "$name" \
              --query "properties.error" -o jsonc || true
            mapfile -t nested_deployments < <(
              az deployment operation group list \
                --resource-group "$rg" --name "$name" \
                --query "[?properties.provisioningState=='Failed' && properties.targetResource.resourceType=='Microsoft.Resources/deployments'].properties.targetResource.resourceName" \
                -o tsv 2>/dev/null || true
            )
            for nested in "${nested_deployments[@]}"; do
              if [ -n "$nested" ]; then
                echo "--- nested deployment detected: $nested ---"
                dump_failures "$rg" "$nested" "$((depth+1))"
              fi
            done
          }

          if ! az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RG" \
            --template-file main.bicep \
            --parameters environments/prod/main.bicepparam; then

            echo "::error::Deployment failed — dumping operation details for $DEPLOYMENT_NAME"
            dump_failures "$RG" "$DEPLOYMENT_NAME"
            exit 1
          fi

  # ── Post-prod cleanup ────────────────────────────────────────────────────────
  # After a full push-triggered deploy succeeds in prod, remove all resources
  # from dev and staging resource groups (RGs themselves are kept).
  cleanup-non-prod:
    name: Cleanup dev and staging after prod
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    # Only run on push-triggered full pipeline runs, not manual single-env dispatches
    if: needs.deploy-prod.result == 'success' && github.event_name == 'push'
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Remove all resources from dev and staging
        shell: bash
        run: |
          set -euo pipefail

          cleanup_env() {
            local rg="$1" env="$2"
            echo "====== Cleaning up $rg ======"

            # 1. VM — must go first so NICs and disk become detachable
            VM="vm-nssdeployment-$env"
            if az vm show --resource-group "$rg" --name "$VM" &>/dev/null; then
              echo "Deleting VM $VM..."
              az vm delete --resource-group "$rg" --name "$VM" --yes
            fi

            # 2. Managed disk
            DISK="disk-nssdeployment-$env"
            if az disk show --resource-group "$rg" --name "$DISK" &>/dev/null; then
              echo "Deleting disk $DISK..."
              az disk delete --resource-group "$rg" --name "$DISK" --yes
            fi

            # 3. NICs (current names + old name pre-rename)
            for NIC in "nic1-nssdeployment-$env" "nic2-nssdeployment-$env" "nic-nssdeployment-$env"; do
              if az network nic show --resource-group "$rg" --name "$NIC" &>/dev/null; then
                echo "Deleting NIC $NIC..."
                az network nic delete --resource-group "$rg" --name "$NIC"
              fi
            done

            # 4. NAT Gateway — detach from all subnets first, then delete
            NATGW="natgw-nssdeployment-$env"
            VNET="vnet-nssdeployment-$env"
            if az network nat gateway show --resource-group "$rg" --name "$NATGW" &>/dev/null; then
              echo "Detaching NAT Gateway $NATGW from any subnets..."
              while IFS= read -r SUBNET; do
                [ -z "$SUBNET" ] && continue
                echo " - Removing NAT Gateway from subnet: $SUBNET"
                az network vnet subnet update \
                  --resource-group "$rg" \
                  --vnet-name "$VNET" \
                  --name "$SUBNET" \
                  --remove natGateway
              done < <(
                az network vnet subnet list \
                  --resource-group "$rg" \
                  --vnet-name "$VNET" \
                  --query "[?natGateway!=null].name" \
                  -o tsv 2>/dev/null || true
              )
              echo "Deleting NAT Gateway $NATGW..."
              az network nat gateway delete --resource-group "$rg" --name "$NATGW"
            fi

            # 5. VNet + subnets
            VNET="vnet-nssdeployment-$env"
            if az network vnet show --resource-group "$rg" --name "$VNET" &>/dev/null; then
              echo "Deleting VNet $VNET..."
              az network vnet delete --resource-group "$rg" --name "$VNET"
            fi

            # 6. All NSGs
            while IFS= read -r NSG; do
              [ -z "$NSG" ] && continue
              echo "Deleting NSG $NSG..."
              az network nsg delete --resource-group "$rg" --name "$NSG"
            done < <(az network nsg list --resource-group "$rg" --query "[].name" -o tsv 2>/dev/null || true)

            # 7. All Public IPs
            while IFS= read -r PIP; do
              [ -z "$PIP" ] && continue
              echo "Deleting Public IP $PIP..."
              az network public-ip delete --resource-group "$rg" --name "$PIP"
            done < <(az network public-ip list --resource-group "$rg" --query "[].name" -o tsv 2>/dev/null || true)

            # Storage accounts are intentionally left untouched.

            # 8. Key Vault — delete then purge so the name is freed immediately
            KV="kv-nssdeployment-$env"
            if az keyvault show --resource-group "$rg" --name "$KV" &>/dev/null; then
              echo "Deleting Key Vault $KV..."
              az keyvault delete --resource-group "$rg" --name "$KV"
              echo "Purging Key Vault $KV..."
              az keyvault purge --name "$KV" --location uksouth \
                || echo "Purge skipped (purge protection enabled or already purged)."
            fi

            echo "====== $rg cleanup complete ======"
          }

          cleanup_env "rg-NSSDeployment-dev"     "dev"
          cleanup_env "rg-NSSDeployment-staging" "staging"
