name: Bicep Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.bicep'
      - '**.bicepparam'
      - '.github/workflows/bicep-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

# Only one deploy workflow runs at a time per branch.
# A new push cancels any in-progress run for the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name == 'push' || github.event.inputs.environment == 'dev'
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep lint
        run: az bicep build --file main.bicep
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_NAME="deploy-dev-${{ github.run_number }}"
          RG="rg-NSSDeployment-dev"

          if ! az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RG" \
            --template-file main.bicep \
            --parameters environments/dev/main.bicepparam \
            --only-show-errors; then

            echo "::error::Deployment failed — dumping operation details for $DEPLOYMENT_NAME"

            az deployment operation group list \
              --resource-group "$RG" \
              --name "$DEPLOYMENT_NAME" \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
              -o table || true

            echo "--- full error payload ---"
            az deployment group show \
              --resource-group "$RG" \
              --name "$DEPLOYMENT_NAME" \
              --query "properties.error" \
              -o jsonc || true

            exit 1
          fi

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    needs: [deploy-dev]
    # For push: only run after dev succeeds (sequential gate).
    # For workflow_dispatch targeting staging: run independently (deploy-dev is skipped).
    if: |
      always() && (
        (github.event_name == 'push' && needs.deploy-dev.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
      )
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep lint
        run: az bicep build --file main.bicep
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_NAME="deploy-staging-${{ github.run_number }}"
          RG="rg-NSSDeployment-staging"

          if ! az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RG" \
            --template-file main.bicep \
            --parameters environments/staging/main.bicepparam \
            --only-show-errors; then

            echo "::error::Deployment failed — dumping operation details for $DEPLOYMENT_NAME"

            az deployment operation group list \
              --resource-group "$RG" \
              --name "$DEPLOYMENT_NAME" \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
              -o table || true

            echo "--- full error payload ---"
            az deployment group show \
              --resource-group "$RG" \
              --name "$DEPLOYMENT_NAME" \
              --query "properties.error" \
              -o jsonc || true

            exit 1
          fi

  deploy-prod:
    name: Deploy to prod (requires approval)
    runs-on: ubuntu-latest
    environment: prod
    needs: [deploy-staging]
    # For push: only run after staging succeeds (sequential gate).
    # For workflow_dispatch targeting prod: run independently (prior jobs are skipped).
    if: |
      always() && (
        (github.event_name == 'push' && needs.deploy-staging.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
      )
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep lint
        run: az bicep build --file main.bicep
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_NAME="deploy-prod-${{ github.run_number }}"
          RG="rg-NSSDeployment-prod"

          if ! az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RG" \
            --template-file main.bicep \
            --parameters environments/prod/main.bicepparam \
            --only-show-errors; then

            echo "::error::Deployment failed — dumping operation details for $DEPLOYMENT_NAME"

            az deployment operation group list \
              --resource-group "$RG" \
              --name "$DEPLOYMENT_NAME" \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
              -o table || true

            echo "--- full error payload ---"
            az deployment group show \
              --resource-group "$RG" \
              --name "$DEPLOYMENT_NAME" \
              --query "properties.error" \
              -o jsonc || true

            exit 1
          fi
