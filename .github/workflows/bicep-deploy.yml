name: Bicep Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.bicep'
      - '**.bicepparam'
      - '.github/workflows/bicep-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

# Only one deploy workflow runs at a time per branch.
# A new push cancels any in-progress run for the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name == 'push' || github.event.inputs.environment == 'dev'
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep lint
        run: az bicep build --file main.bicep
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_NAME="deploy-dev-${{ github.run_number }}"
          RG="rg-NSSDeployment-dev"

          dump_failures() {
            local rg="$1" name="$2"
            echo "--- failed operations: $name ---"
            az deployment operation group list \
              --resource-group "$rg" --name "$name" \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
              -o table || true

            local nested
            nested=$(az deployment operation group list \
              --resource-group "$rg" --name "$name" \
              --query "[?properties.provisioningState=='Failed' && properties.targetResource.resourceType=='Microsoft.Resources/deployments'].properties.targetResource.resourceName | [0]" \
              -o tsv 2>/dev/null || true)

            if [ -n "$nested" ]; then
              echo "--- nested deployment: $nested ---"
              az deployment operation group list \
                --resource-group "$rg" --name "$nested" \
                --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
                -o table || true

              echo "--- full nested error payload ---"
              az deployment group show \
                --resource-group "$rg" --name "$nested" \
                --query "properties.error" -o jsonc || true
            fi

            echo "--- full top-level error payload ---"
            az deployment group show \
              --resource-group "$rg" --name "$name" \
              --query "properties.error" -o jsonc || true
          }

          if ! az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RG" \
            --template-file main.bicep \
            --parameters environments/dev/main.bicepparam \
            --parameters vhdSasUri="${{ secrets.AZURE_VHD_SAS_URI }}" \
            --only-show-errors; then

            echo "::error::Deployment failed — dumping operation details for $DEPLOYMENT_NAME"
            dump_failures "$RG" "$DEPLOYMENT_NAME"
            exit 1
          fi

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    needs: [deploy-dev]
    if: |
      always() && (
        (github.event_name == 'push' && needs.deploy-dev.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
      )
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep lint
        run: az bicep build --file main.bicep
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_NAME="deploy-staging-${{ github.run_number }}"
          RG="rg-NSSDeployment-staging"

          dump_failures() {
            local rg="$1" name="$2"
            echo "--- failed operations: $name ---"
            az deployment operation group list \
              --resource-group "$rg" --name "$name" \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
              -o table || true

            local nested
            nested=$(az deployment operation group list \
              --resource-group "$rg" --name "$name" \
              --query "[?properties.provisioningState=='Failed' && properties.targetResource.resourceType=='Microsoft.Resources/deployments'].properties.targetResource.resourceName | [0]" \
              -o tsv 2>/dev/null || true)

            if [ -n "$nested" ]; then
              echo "--- nested deployment: $nested ---"
              az deployment operation group list \
                --resource-group "$rg" --name "$nested" \
                --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
                -o table || true

              echo "--- full nested error payload ---"
              az deployment group show \
                --resource-group "$rg" --name "$nested" \
                --query "properties.error" -o jsonc || true
            fi

            echo "--- full top-level error payload ---"
            az deployment group show \
              --resource-group "$rg" --name "$name" \
              --query "properties.error" -o jsonc || true
          }

          if ! az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RG" \
            --template-file main.bicep \
            --parameters environments/staging/main.bicepparam \
            --parameters vhdSasUri="${{ secrets.AZURE_VHD_SAS_URI }}" \
            --only-show-errors; then

            echo "::error::Deployment failed — dumping operation details for $DEPLOYMENT_NAME"
            dump_failures "$RG" "$DEPLOYMENT_NAME"
            exit 1
          fi

  deploy-prod:
    name: Deploy to prod (requires approval)
    runs-on: ubuntu-latest
    environment: prod
    needs: [deploy-staging]
    if: |
      always() && (
        (github.event_name == 'push' && needs.deploy-staging.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
      )
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep lint
        run: az bicep build --file main.bicep
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_NAME="deploy-prod-${{ github.run_number }}"
          RG="rg-NSSDeployment-prod"

          dump_failures() {
            local rg="$1" name="$2"
            echo "--- failed operations: $name ---"
            az deployment operation group list \
              --resource-group "$rg" --name "$name" \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
              -o table || true

            local nested
            nested=$(az deployment operation group list \
              --resource-group "$rg" --name "$name" \
              --query "[?properties.provisioningState=='Failed' && properties.targetResource.resourceType=='Microsoft.Resources/deployments'].properties.targetResource.resourceName | [0]" \
              -o tsv 2>/dev/null || true)

            if [ -n "$nested" ]; then
              echo "--- nested deployment: $nested ---"
              az deployment operation group list \
                --resource-group "$rg" --name "$nested" \
                --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,code:properties.statusMessage.error.code,message:properties.statusMessage.error.message}" \
                -o table || true

              echo "--- full nested error payload ---"
              az deployment group show \
                --resource-group "$rg" --name "$nested" \
                --query "properties.error" -o jsonc || true
            fi

            echo "--- full top-level error payload ---"
            az deployment group show \
              --resource-group "$rg" --name "$name" \
              --query "properties.error" -o jsonc || true
          }

          if ! az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RG" \
            --template-file main.bicep \
            --parameters environments/prod/main.bicepparam \
            --parameters vhdSasUri="${{ secrets.AZURE_VHD_SAS_URI }}" \
            --only-show-errors; then

            echo "::error::Deployment failed — dumping operation details for $DEPLOYMENT_NAME"
            dump_failures "$RG" "$DEPLOYMENT_NAME"
            exit 1
          fi
